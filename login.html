<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Smart Survey</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>Login to Smart Survey</h1>

            <p>Sign in to continue to Smart Survey</p>

            <div class="role-selection">

                <input type="radio" id="admin" name="role" value="admin" checked>
                <label for="admin" class="role-card">👨‍💼 Admin</label>

                <input type="radio" id="user" name="role" value="user">
                <label for="user" class="role-card">👤 User</label>

            </div>

            <div class="input-group">

                <label>Username</label>

                <input type="text" id="username" placeholder="Enter Username">

                <small id="userError"></small>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password" id="password" placeholder="Enter Password">

                <small id="passError"></small>

            </div>

            <button id="loginBtn">

                Login

            </button>

            <p id="loginError"></p>

            <a href="index.html" class="back">

                ← Back to Home

            </a>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
